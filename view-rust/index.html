<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nick's Tower Defense</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: sans-serif; }

      /* Auth / lobby views */
      .auth-view, .lobby-view, .waiting-view {
        max-width: 480px; margin: 80px auto; padding: 24px;
        background: #1e1e1e; border-radius: 8px;
      }
      .auth-view h2, .lobby-view h1 { margin-bottom: 16px; }
      .auth-view form div { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
      .auth-view input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #eee; }
      .auth-view button, .lobby-view button, .waiting-view button { padding: 8px 16px; border-radius: 4px; border: none; background: #3a7bd5; color: #fff; cursor: pointer; }
      .auth-view button:disabled { opacity: 0.5; cursor: not-allowed; }
      .error { color: #f66; margin: 8px 0; }
      .lobby-view header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .lobby-list ul { list-style: none; }
      .lobby-item { display: flex; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
      .logout-btn { background: #555; }

      /* Game view: canvas fills viewport, HUD overlays bottom */
      .game-view { position: relative; width: 100vw; height: 100vh; }
      #game-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      .game-click-overlay { position: absolute; inset: 0; z-index: 5; cursor: crosshair; }
      .game-hud {
        position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
        padding: 10px 16px; background: rgba(0,0,0,0.65);
        display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      }
      .hud-status { display: flex; gap: 16px; align-items: center; margin-right: auto; }
      .hud-phase { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
      .hud-gold { color: #ffd700; }
      .hud-income { color: #88cc88; font-size: 12px; }
      .hud-timer { color: #aaa; }
      .hud-section { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .hud-label { color: #aaa; font-size: 12px; margin-right: 2px; }
      .hud-actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .hud-actions button, .hud-section button { padding: 6px 12px; border-radius: 4px; border: none; background: #2a5298; color: #fff; cursor: pointer; font-size: 13px; }
      .hud-actions button:hover, .hud-section button:hover { background: #3a6bc8; }
      .shape-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid #444; background: #222; color: #ccc; cursor: pointer; font-size: 13px; }
      .shape-btn:hover { background: #333; }
      .shape-btn.active { background: #2a5298; color: #fff; border-color: #4a80d8; }
    </style>
  </head>
  <body></body>
</html>
