<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body {
            background-color: var(--td-bg-deep, #0a0e1a);
            color: var(--td-text-primary, #e5e7eb);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .container { margin-top: 50px; }
        #auth-view { max-width: 500px; }
        /* Materialize inputs assume a light page; restyle for the dark theme. */
        .input-field input[type=text],
        .input-field input[type=password] {
            color: var(--td-text-primary, #e5e7eb);
            border-bottom: 1px solid var(--td-grid-line, #2a3558);
        }
        .input-field label { color: var(--td-text-muted, #9ca3af); }
        .input-field input[type=text]:focus,
        .input-field input[type=password]:focus {
            border-bottom: 1px solid var(--td-accent, #22d3ee) !important;
            box-shadow: 0 1px 0 0 var(--td-accent, #22d3ee) !important;
        }
        .input-field input[type=text]:focus + label,
        .input-field input[type=password]:focus + label {
            color: var(--td-accent, #22d3ee) !important;
        }
        /* Chrome autofill paints white-on-white; force theme colors. */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: var(--td-text-primary, #e5e7eb);
            -webkit-box-shadow: 0 0 0 1000px var(--td-bg-deep, #0a0e1a) inset;
            caret-color: var(--td-text-primary, #e5e7eb);
        }
        #lobby-selection, #game-view { display: none; }
        #game-view { flex-direction: column; align-items: flex-start; }
        #lobby-selection h2 { text-align: center; }

        #game-canvas-host canvas {
            border: 1px solid var(--td-grid-line);
            border-radius: 6px;
            box-shadow: 0 0 24px rgba(34, 211, 238, 0.12);
        }

        #controls { margin-bottom: 8px; }
        #controls button {
            background: var(--td-bg-panel);
            color: var(--td-text-primary);
            border: 1px solid var(--td-grid-line);
            border-radius: 4px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.9em;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        #controls button:hover {
            border-color: var(--td-accent);
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.35);
        }
        #game-status { margin-bottom: 6px; color: var(--td-text-muted); }
        #game-status span { color: var(--td-text-primary); font-weight: 600; }
        #gold-display { color: var(--td-accent-gold) !important; }

        #ui-panel {
            background-color: var(--td-bg-panel);
            border: 1px solid var(--td-grid-line);
            border-radius: 6px;
            padding: 10px;
            flex-direction: row;
            gap: 10px;
            align-items: flex-start;
            margin-top: 8px;
            width: 700px;
            box-sizing: border-box;
        }
        .panel-portrait canvas { border: 1px solid var(--td-grid-line); display: block; border-radius: 4px; }
        .panel-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .panel-name { font-size: 1.1em; font-weight: bold; color: var(--td-accent); }
        .bar-row { display: flex; align-items: center; gap: 6px; }
        .bar-label { width: 22px; font-size: 0.85em; color: var(--td-text-muted); }
        .bar-track { flex: 1; height: 12px; background: #0d1120; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.1s; }
        .hp-fill { background: var(--td-hp-fill); box-shadow: 0 0 6px var(--td-hp-fill); }
        .mana-fill { background: var(--td-mana-fill); box-shadow: 0 0 6px var(--td-mana-fill); }
        .bar-numeric { width: 70px; font-size: 0.8em; text-align: right; color: var(--td-text-muted); }
        .worker-state { font-size: 0.85em; color: var(--td-text-muted); }
        .panel-stats { min-width: 140px; display: flex; flex-direction: column; gap: 3px; }
        .stat-row { display: flex; justify-content: space-between; gap: 8px; font-size: 0.85em; }
        .boss-row { color: var(--td-fx-fire); font-weight: bold; }
        .panel-abilities { min-width: 90px; display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }

        #mercenary-panel {
            background-color: var(--td-bg-panel);
            border: 1px solid var(--td-merc-building);
            border-radius: 6px;
            box-shadow: 0 0 12px rgba(153, 27, 27, 0.35);
            padding: 10px 14px;
            margin-top: 8px;
            width: 700px;
            box-sizing: border-box;
        }
        .merc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .merc-header span { font-size: 1.1em; font-weight: bold; color: var(--td-accent-gold); }
        .merc-unit-list { display: flex; flex-direction: column; gap: 6px; }
        .merc-unit-row { display: flex; align-items: center; gap: 12px; font-size: 0.9em; }
        .merc-unit-name { min-width: 90px; font-weight: bold; }
        .merc-unit-cost { min-width: 40px; color: var(--td-accent-gold); }
        .merc-unit-income { min-width: 80px; color: var(--td-enemy); }
        .merc-send-btn { margin: 0; padding: 0 10px; height: 28px; background: var(--td-merc-building); color: #fff; border: none; border-radius: 3px; cursor: pointer; font-size: 0.85em; }
        .merc-send-btn:hover { background: #b91c1c; }
        .merc-send-btn[data-unaffordable="true"] { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

        #king-upgrade-panel {
            background-color: var(--td-bg-panel);
            border: 1px solid var(--td-accent-gold);
            border-radius: 6px;
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.25);
            padding: 10px 14px;
            margin-top: 8px;
            width: 340px;
            box-sizing: border-box;
            font-size: 0.9em;
        }
        .king-panel-header { margin-bottom: 6px; }
        .king-panel-title { font-size: 1.05em; font-weight: bold; color: var(--td-accent-gold); }
        .king-panel-hp { color: var(--td-text-muted); margin-bottom: 4px; }
        .king-panel-upgrade-info { color: var(--td-hp-fill); margin-bottom: 6px; font-size: 0.85em; }
        .king-upgrade-btn {
            padding: 0 12px;
            height: 28px;
            background: transparent;
            color: var(--td-accent-gold);
            border: 1px solid var(--td-accent-gold);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.85em;
            transition: box-shadow 0.15s;
        }
        .king-upgrade-btn:hover:not(:disabled) { box-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .king-upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(5, 8, 16, 0.88);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }
        #game-result-title { font-size: 4em; margin: 0; letter-spacing: 6px; }
        #game-result-title.defeat { color: var(--td-fx-error); text-shadow: 0 0 24px var(--td-fx-error); }
        #game-result-title.victory { color: var(--td-accent-gold); text-shadow: 0 0 24px var(--td-accent-gold); }
        #game-result-subtitle { color: var(--td-text-muted); font-size: 1.2em; margin: 0; }
        #overlay-leave-lobby { margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-view" class="container">
        <div class="row">
            <!-- Registration Form -->
            <div class="col s12">
                <h3>Register</h3>
                <form id="register-form">
                    <div class="input-field">
                        <input id="register-username" type="text" required>
                        <label for="register-username">Username</label>
                    </div>
                    <div class="input-field">
                        <input id="register-password" type="password" required>
                        <label for="register-password">Password</label>
                    </div>
                    <button class="btn waves-effect waves-light" type="submit">Register</button>
                </form>
            </div>
        </div>
        <div class="row">
            <!-- Login Form -->
            <div class="col s12">
                <h3>Login</h3>
                <form id="login-form">
                    <div class="input-field">
                        <input id="login-username" type="text" required>
                        <label for="login-username">Username</label>
                    </div>
                    <div class="input-field">
                        <input id="login-password" type="password" required>
                        <label for="login-password">Password</label>
                    </div>
                    <button class="btn waves-effect waves-light" type="submit">Login</button>
                </form>
            </div>
        </div>
        <div id="auth-status" class="row"></div>
    </div>

    <div id="lobby-selection" class="container">
        <h2>Play</h2>
        <div class="center-align">
            <button id="queue-btn" class="btn-large waves-effect waves-light">Queue for Match</button>
            <button id="cancel-queue-btn" class="btn-large red waves-effect waves-light" style="display: none;">Cancel</button>
            <p id="queue-status"></p>
        </div>
    </div>

    <div id="game-view">
        <div id="controls">
            <div id="game-status">
                Phase: <span id="game-phase"></span> | Time: <span id="game-timer"></span> | Gold: <span id="gold-display">0</span> | King HP: <span id="lives-display">--</span>
            </div>
            <div id="family-pick"></div>
            <div id="build-shop"></div>
            <button id="hire-worker-btn">Hire Worker (50g)</button>
            <button id="skip-to-combat">Start Combat</button>
            <button id="leave-lobby">Leave Lobby</button>
        </div>
        <div id="game-canvas-host"></div>
        <div id="mercenary-panel">
            <div class="merc-header">
                <span>⚔ Send Units</span>
                <button data-merc="close-btn" class="btn btn-small red lighten-2">Close</button>
            </div>
            <div data-merc="unit-list" class="merc-unit-list"></div>
        </div>
        <div id="king-upgrade-panel"></div>
        <div id="game-over-overlay">
            <h1 id="game-result-title"></h1>
            <p id="game-result-subtitle"></p>
            <button id="overlay-leave-lobby" class="btn waves-effect waves-light">Return to Lobby</button>
        </div>
        <div id="ui-panel">
            <!-- Portrait section -->
            <div class="panel-portrait">
                <canvas data-panel="portrait" width="80" height="80"></canvas>
            </div>

            <!-- Info section: name, HP bar, mana bar, worker state -->
            <div class="panel-info">
                <div data-panel="name" class="panel-name"></div>

                <!-- HP row -->
                <div class="bar-row">
                    <span class="bar-label">HP</span>
                    <div class="bar-track">
                        <div data-panel="hp-fill" class="bar-fill hp-fill"></div>
                    </div>
                    <span data-panel="hp-label" class="bar-numeric"></span>
                </div>

                <!-- Mana row (hidden when unit has no mana) -->
                <div data-panel="mana-row" class="bar-row" style="display: none">
                    <span class="bar-label">MP</span>
                    <div class="bar-track">
                        <div data-panel="mana-fill" class="bar-fill mana-fill"></div>
                    </div>
                    <span data-panel="mana-label" class="bar-numeric"></span>
                </div>

                <!-- Worker state (hidden for non-workers) -->
                <div data-panel="worker-state-row" class="worker-state" style="display: none">
                    State: <span data-panel="worker-state-label"></span>
                </div>
            </div>

            <!-- Stats section (populated dynamically by applyStaticInfo) -->
            <div data-panel="stats" class="panel-stats"></div>

            <!-- Ability grid section -->
            <div class="panel-abilities">
                <button data-panel="sell-btn" class="btn btn-small waves-effect waves-light" style="display: none">
                    Sell (<span data-panel="sell-value"></span>)
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script type="module" src="/app.ts"></script>
</body>
</html>
